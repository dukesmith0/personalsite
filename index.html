<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Duke Smith</title>
    <meta name="description" content="Duke Smith - aerospace engineer working on satellite instrumentation. UCLA." />
    <meta name="theme-color" content="#06070d" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Fonts (Josefin Sans / Josefin Slab) are self-hosted via @fontsource -->
  </head>
  <body>
    <!-- Decorative layers: 3D scene, vignette, film grain -->
    <canvas id="scene"></canvas>
    <div id="scene-veil" aria-hidden="true"></div>
    <div id="grain" aria-hidden="true"></div>

    <div id="boot"><div class="b">Initializing flight scene...</div></div>

    <header class="topbar">
      <a class="brand" href="#top" aria-label="Home, back to top">
        <img class="avatar" id="brandAvatar" src="/me.png" alt="" width="40" height="40" />
        <div class="brand-text">
          <div class="name" id="brandName"></div>
          <div class="role" id="brandRole"></div>
        </div>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="#top">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <main>
      <!-- Hero -->
      <section class="hero" id="top">
        <div class="wrap">
          <div class="kicker" id="heroKicker" data-reveal></div>
          <h1 id="heroTitle" data-reveal data-reveal-delay="1"></h1>
          <p class="lede" id="heroLede" data-reveal data-reveal-delay="2"></p>
        </div>
        <div class="scroll-hint" aria-hidden="true">SCROLL<span></span></div>
      </section>

      <!-- About -->
      <section class="about" id="about">
        <div class="wrap">
          <div>
            <div class="kicker" id="aboutKicker" data-reveal></div>
            <h2 id="aboutHeading" data-reveal></h2>
            <div id="aboutText" data-reveal data-reveal-delay="1"></div>
          </div>
          <div class="portrait" id="aboutPortrait" data-reveal data-reveal-delay="2" aria-hidden="true"></div>
        </div>
      </section>

      <!-- Projects -->
      <section class="projects" id="projects">
        <div class="wrap">
          <div class="kicker" id="projectsKicker" data-reveal></div>
          <h2 id="projectsHeading" data-reveal></h2>
          <div class="grid" id="projectGrid"></div>
        </div>
      </section>

      <!-- Experience -->
      <section class="experience" id="experience">
        <div class="wrap">
          <div class="kicker" id="experienceKicker" data-reveal></div>
          <h2 id="experienceHeading" data-reveal></h2>
          <div class="grid" id="timeline"></div>
        </div>
      </section>

      <!-- Contact -->
      <section class="contact" id="contact">
        <div class="wrap">
          <div class="kicker" id="contactKicker" data-reveal></div>
          <h2 id="contactHeading" data-reveal></h2>
          <div class="links" id="contactLinks" data-reveal data-reveal-delay="1"></div>
        </div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
